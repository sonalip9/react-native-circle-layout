pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{js,ts,jsx,tsx}'
      run: npx eslint {staged_files}

    types:
      glob: '*.{js,ts,jsx,tsx}'
      run: npx tsc {staged_files}

commit-msg:
  parallel: true
  commands:
    commitlint:
      run: npx commitlint --edit

pre-push:
  parallel: true
  commands:
    test:
      run: yarn test
